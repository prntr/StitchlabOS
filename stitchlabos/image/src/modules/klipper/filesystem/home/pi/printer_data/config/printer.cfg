[include mainsail.cfg]

[include embroidery_macros.cfg]

# WiFi management now handled by Moonraker wifi_manager component
# API: GET/POST /server/wifi/status, /server/wifi/scan, /server/wifi/connect, etc.
# See moonraker.conf for full endpoint list

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio4
position_endstop: 0
position_max: 90
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: gpio6
dir_pin: !gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio3
position_endstop: 0
position_max: 120
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 1.086957
endstop_pin: ^gpio25
position_endstop: 0.0
position_max: 5000000
homing_speed: 5
homing_retract_dist: 0.5

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 1.2
stealthchop_threshold: 0

[temperature_sensor pico]
sensor_type: temperature_mcu

# UART-connected SKR Pico (Pi GPIO14/15 ↔ Pico GPIO1/GPIO0)
[mcu]
serial: /dev/serial0
baud: 115200
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1500
max_z_velocity: 60
max_z_accel: 120

[neopixel board_neopixel]
pin: gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.1
initial_GREEN: 0.0
initial_BLUE: 0.1
